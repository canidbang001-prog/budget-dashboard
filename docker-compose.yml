services:
  api:
    build: .
    image: budget-dashboard:latest
    container_name: budget-dashboard
    ports:
      - "3003:3003"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-1234!}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-3600}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - PYTHONIOENCODING=UTF-8
    volumes:
      - ./budget.db:/app/budget.db
      - ./summary.json:/app/summary.json:ro
      - ./budget.csv:/app/budget.csv:ro
    restart: unless-stopped
