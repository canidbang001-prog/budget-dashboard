<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}홍성군 합본예산서 대시보드{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-inner">
            <a href="/" class="logo">📋 홍성군 합본예산서</a>
            <nav>
                <a href="/">대시보드</a>
                <a href="/search">검색</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <p>2026년도 추경 1회 성립전 7차 ~ 전체 | 파싱 완료: 990페이지, 37,958개 노드</p>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
