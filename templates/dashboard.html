{% extends "base.html" %}
{% block title %}예산 대시보드 — 홍성군{% endblock %}

{% block content %}
<div class="dashboard">
    <!-- 상단 요약 카드 -->
    <div class="summary-cards" id="summaryCards">
        <div class="card">
            <div class="card-value" id="totalBudget">—</div>
            <div class="card-label">총 예산액</div>
        </div>
        <div class="card">
            <div class="card-value" id="deptCount">—</div>
            <div class="card-label">부서 수</div>
        </div>
        <div class="card">
            <div class="card-value" id="totalNodes">—</div>
            <div class="card-label">총 노드 수</div>
        </div>
    </div>

    <!-- 투-컬럼 레이아웃 -->
    <div class="dashboard-grid">
        <!-- 좌측: 부서 목록 -->
        <div class="panel dept-panel">
            <h2>🏛️ 부서별 예산</h2>
            <div class="search-box">
                <input type="text" id="deptSearch" placeholder="부서명 검색..." oninput="filterDepartments()">
            </div>
            <div class="dept-list" id="deptList">
                <div class="loading">불러오는 중...</div>
            </div>
        </div>

        <!-- 우측: 트리 뷰 -->
        <div class="panel tree-panel">
            <div class="tree-header">
                <h2 id="treeTitle">📊 예산 트리</h2>
                <div class="tree-controls">
                    <button onclick="expandAll()" class="btn-sm">전체 펼치기</button>
                    <button onclick="collapseAll()" class="btn-sm">전체 접기</button>
                </div>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="loading">부서를 선택하면 트리가 표시됩니다.</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 금액 포맷
function fmt(n) {
    if (n === 0) return '0';
    return (n / 1000).toLocaleString('ko-KR');
}

function fmtFull(n) {
    return n.toLocaleString('ko-KR');
}

// 요약 로드
async function loadSummary() {
    const res = await fetch('/api/summary');
    const data = await res.json();
    document.getElementById('totalBudget').textContent = (data.total_budget / 1000).toLocaleString('ko-KR') + '천원';
    document.getElementById('deptCount').textContent = data.department_count;
    document.getElementById('totalNodes').textContent = data.total_nodes.toLocaleString('ko-KR');
    
    // 부서 목록 렌더링
    renderDeptList(data.departments);
}

function renderDeptList(departments) {
    const container = document.getElementById('deptList');
    container.innerHTML = departments.map((d, i) => {
        const pct = departments.length > 0 ? 0 : 0; // relative pct handled in CSS
        return `
        <div class="dept-item" onclick="selectDept('${escapeHtml(d.dept)}', this)" data-dept="${escapeHtml(d.dept)}">
            <div class="dept-name">${escapeHtml(d.dept)}</div>
            <div class="dept-budget">${fmt(d.budget_amount)}천원</div>
            <div class="dept-bar"><div class="dept-bar-fill" style="width:${Math.min(100, (d.budget_amount / departments[0].budget_amount) * 100)}%"></div></div>
            <div class="dept-finance">
                ${d.finance_national > 0 ? '<span class="fin-tag nat">국 ' + fmt(d.finance_national) + '</span>' : ''}
                ${d.finance_province > 0 ? '<span class="fin-tag prov">도 ' + fmt(d.finance_province) + '</span>' : ''}
                ${d.finance_county > 0 ? '<span class="fin-tag cnty">군 ' + fmt(d.finance_county) + '</span>' : ''}
                ${d.finance_other > 0 ? '<span class="fin-tag other">기 ' + fmt(d.finance_other) + '</span>' : ''}
            </div>
        </div>`;
    }).join('');
    
    window._deptData = departments;
}

function filterDepartments() {
    const q = document.getElementById('deptSearch').value.toLowerCase();
    const items = document.querySelectorAll('.dept-item');
    items.forEach(item => {
        const dept = item.dataset.dept.toLowerCase();
        item.style.display = dept.includes(q) ? '' : 'none';
    });
}

// 트리 로드
let selectedDept = null;
let expandedNodes = new Set();

async function selectDept(dept, el) {
    selectedDept = dept;
    
    // 하이라이트
    document.querySelectorAll('.dept-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    
    document.getElementById('treeTitle').textContent = '📊 ' + dept;
    
    const container = document.getElementById('treeContainer');
    container.innerHTML = '<div class="loading">불러오는 중...</div>';
    
    // depth 0-1 노드 로드
    const res = await fetch(`/api/tree?dept=${encodeURIComponent(dept)}&limit=2000`);
    const nodes = await res.json();
    expandedNodes.clear();
    
    renderTree(nodes, container);
}

function renderTree(allNodes, container) {
    // 부모-자식 관계 매핑
    const nodeMap = {};
    const roots = [];
    
    allNodes.forEach(n => {
        nodeMap[n.id] = n;
        n._children = [];
        n._visible = true;
    });
    
    allNodes.forEach(n => {
        if (n.parent_id && nodeMap[n.parent_id]) {
            nodeMap[n.parent_id]._children.push(n);
        }
    });
    
    // 루트 노드 찾기 (선택된 부서의 depth 0-1 노드들)
    // depth 1 노드들을 최상위로 표시
    allNodes.forEach(n => {
        if (n.depth === 1 && n.dept === selectedDept) {
            roots.push(n);
        }
    });
    
    // depth 1이 없으면 depth 0 노드를 루트로
    if (roots.length === 0) {
        allNodes.forEach(n => {
            if (n.depth === 0 && !n.is_total) {
                roots.push(n);
            }
        });
    }
    
    if (roots.length === 0) {
        container.innerHTML = '<div class="empty">트리 데이터가 없습니다.</div>';
        return;
    }
    
    container.innerHTML = roots.map(r => renderNodeHTML(r, nodeMap, 0)).join('');
}

function renderNodeHTML(node, nodeMap, level) {
    const hasChildren = node._children && node._children.length > 0;
    const isExpanded = expandedNodes.has(node.id);
    const depthClass = `depth-${node.depth}`;
    
    let name = '';
    if (node.calc_name) name = node.calc_name;
    else if (node.item_name) name = `[${node.item_code || ''}] ${node.item_name}`;
    else if (node.detail) name = node.detail;
    else if (node.unit) name = node.unit;
    else if (node.policy) name = node.policy;
    else if (node.dept) name = node.dept;
    
    const indent = level * 20;
    
    let financeHTML = '';
    if (node.finance_national > 0 || node.finance_province > 0 || node.finance_county > 0 || node.finance_other > 0) {
        const parts = [];
        if (node.finance_national > 0) parts.push('<span class="fin-tag nat">국 ' + fmt(node.finance_national) + '</span>');
        if (node.finance_province > 0) parts.push('<span class="fin-tag prov">도 ' + fmt(node.finance_province) + '</span>');
        if (node.finance_county > 0) parts.push('<span class="fin-tag cnty">군 ' + fmt(node.finance_county) + '</span>');
        if (node.finance_other > 0) parts.push('<span class="fin-tag other">기 ' + fmt(node.finance_other) + '</span>');
        financeHTML = '<div class="tree-finance">' + parts.join(' ') + '</div>';
    }
    
    let childrenHTML = '';
    if (hasChildren && isExpanded) {
        childrenHTML = node._children
            .filter(c => !c.is_finance)
            .map(c => renderNodeHTML(c, nodeMap, level + 1))
            .join('');
    }
    
    const expandIcon = hasChildren 
        ? `<span class="tree-toggle ${isExpanded ? 'expanded' : ''}" onclick="toggleNode(event, ${node.id})">${isExpanded ? '▼' : '▶'}</span>`
        : '<span class="tree-toggle leaf"></span>';
    
    return `
    <div class="tree-node ${depthClass}" data-node-id="${node.id}">
        <div class="tree-row" style="padding-left:${indent}px" onclick="handleRowClick(event, ${node.id}, ${hasChildren})">
            ${expandIcon}
            <span class="tree-name">${escapeHtml(name)}</span>
            <span class="tree-amount ${node.is_total ? 'total' : ''}">${fmt(node.budget_amount)}천원</span>
            ${node.prev_amount > 0 ? `<span class="tree-prev">(전년: ${fmt(node.prev_amount)}천원)</span>` : ''}
        </div>
        ${financeHTML}
        <div class="tree-children ${isExpanded ? 'expanded' : ''}" id="children-${node.id}">
            ${childrenHTML}
        </div>
    </div>`;
}

async function toggleNode(event, nodeId) {
    event.stopPropagation();
    
    if (expandedNodes.has(nodeId)) {
        expandedNodes.delete(nodeId);
    } else {
        expandedNodes.add(nodeId);
        // 자식 노드가 아직 로드되지 않았으면 로드
        const childrenDiv = document.getElementById('children-' + nodeId);
        if (childrenDiv && childrenDiv.children.length === 0) {
            childrenDiv.innerHTML = '<div class="loading-sm">로딩...</div>';
            const res = await fetch(`/api/tree?parent_id=${nodeId}&limit=500`);
            const childNodes = await res.json();
            
            // 캐시에 추가하고 다시 렌더링
            if (!window._allNodes) window._allNodes = [];
            window._allNodes = window._allNodes.concat(childNodes);
        }
    }
    
    // 트리 새로고침
    refreshTree();
}

function handleRowClick(event, nodeId, hasChildren) {
    if (hasChildren) {
        toggleNode(event, nodeId);
    }
}

function refreshTree() {
    if (!selectedDept) return;
    const container = document.getElementById('treeContainer');
    const allNodes = window._allNodes || [];
    
    // 현재 트리에 표시된 모든 노드 수집
    const displayedNodes = [];
    document.querySelectorAll('.tree-node').forEach(el => {
        const nid = parseInt(el.dataset.nodeId);
        if (nid && !displayedNodes.find(n => n.id === nid)) {
            // find from allNodes
            const found = allNodes.find(n => n.id === nid);
            if (found) displayedNodes.push(found);
        }
    });
    
    if (displayedNodes.length > 0) {
        renderTree(displayedNodes, container);
    }
}

function expandAll() {
    document.querySelectorAll('.tree-node').forEach(el => {
        const nid = parseInt(el.dataset.nodeId);
        if (nid) expandedNodes.add(nid);
    });
    refreshTree();
}

function collapseAll() {
    expandedNodes.clear();
    if (selectedDept) {
        const deptEl = document.querySelector(`.dept-item[data-dept="${escapeHtml(selectedDept)}"]`);
        if (deptEl) selectDept(selectedDept, deptEl);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 초기 로드
loadSummary();
</script>
{% endblock %}
